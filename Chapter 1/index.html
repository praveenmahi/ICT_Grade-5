<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Game 🎮</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: linear-gradient(135deg,#89f7fe,#66a6ff);
}

.container {
    max-width: 600px;
    margin: auto;
    padding: 15px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 15px;
}

button {
    width: 90%;
    padding: 12px;
    margin: 8px;
    font-size: 16px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    background: #4CAF50;
    color: white;
}

#restartBtn { display:none; background:#ff5722; }

canvas {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h2>🎮 Evolution of Computers Quiz</h2>

<!-- START SCREEN -->
<div id="startScreen">
<input type="text" id="username" placeholder="Enter your name"><br>

<select id="level">
<option value="easy">Easy</option>
<option value="medium">Medium</option>
<option value="hard">Hard</option>
</select>

<button onclick="startGame()">▶️ Start Quiz</button>
</div>

<!-- QUIZ AREA -->
<div id="quizBox" style="display:none;">
<h3 id="timer"></h3>
<h3 id="progress"></h3>
<h3 id="question"></h3>
<div id="options"></div>
<h3 id="score"></h3>

🔊 Volume:
<input type="range" min="0" max="1" step="0.1" value="1" id="volume">

<button id="restartBtn" onclick="restartQuiz()">🔄 Restart</button>
</div>

</div>
</div>

<audio id="correctSound" src="correct.mp3"></audio>
<audio id="wrongSound" src="wrong.mp3"></audio>
<canvas id="confetti"></canvas>

<script>

// QUESTIONS (Chapter-based)
let allQuestions = {

easy: [
{q:"First calculating device?", options:["Laptop","Abacus","Phone","Tablet"], answer:1},
{q:"Abacus has?", options:["Beads","Screen","Battery","Wire"], answer:0},
{q:"Upper part of abacus?", options:["Heaven","Earth","Top","Sky"], answer:0},
{q:"Lower part of abacus?", options:["Heaven","Earth","Bottom","Ground"], answer:1},
{q:"A Computer stores?", options:["Food","Water","Data","Air"], answer:2},
{q:"Computer works on?", options:["Electricity","Water","Air","Magic"], answer:0},
{q:"Computers are used in?", options:["Hospitals","Banks","Schools","All"], answer:3},
{q:"Dust & liquids are______________ of computer?", options:["Friends","Enemies","Tools","Devices"], answer:1},
{q:"Early counting used?", options:["Stones","Apps","Phones","TV"], answer:0},
{q:"Fastest device?", options:["Computer","Human","Abacus","Stone"], answer:0}
],

medium: [
{q:"Who invented Pascaline?", options:["Newton","Babbage","Ada","Blaise Pascal"], answer:3},
{q:"Father of computers?", options:["Babbage","Pascal","Ada","Hollerith"], answer:0},
{q:"Binary system?", options:["Ada Lovelace","Pascal","Babbage","Newton"], answer:0},
{q:"Hollerith invented?", options:["Abacus","Tabulating Machine","Laptop","IC"], answer:1},
{q:"Second generation used?", options:["Transistors","Vacuum","IC","AI"], answer:0},
{q:"Third generation used?", options:["IC","Vacuum","AI","Wire"], answer:0},
{q:"IC stands for?", options:["Integrated Circuit","Internal Code","Input","None"], answer:0},
{q:"Pascaline used?", options:["Wheels","Beads","Cards","AI"], answer:0},
{q:"Punched cards?", options:["Hollerith Machine","Abacus","IC","AI"], answer:0},
{q:"Analytical Engine?", options:["Pascal","Ada","Babbage","Newton"], answer:2}
],

hard: [
{q:"First generation of computers used?", options:["Vacuum tubes","IC","AI","Transistors"], answer:0},
{q:"Fourth generation of computers used?", options:["VLSI","IC","Vacuum","Wire"], answer:0},
{q:"Fifth generation of computers are based on?", options:["AI","IC","Transistor","Vacuum"], answer:0},
{q:"ULSI means?", options:["Ultra Large Scale Integration","Ultra Light","None","Low"], answer:0},
{q:"Parallel processing?", options:["Multiple tasks","Single","None","Slow"], answer:0},
{q:"ENIAC belongs to?", options:["First generation","Second","Third","Fourth"], answer:0},
{q:"Microprocessor uses?", options:["VLSI","SSI","MSI","None"], answer:0},
{q:"Vacuum tubes produce?", options:["Cold","Sound","Light","Heat"], answer:3},
{q:"AI computers can?", options:["Think","Sleep","Eat","Walk"], answer:0},
{q:"Generations of computers?", options:["Four","Five","Three","Two"], answer:1}
]
};

let questions=[], index=0, score=0, time=10, timer;

// Volume
document.getElementById("volume").oninput=(e)=>{
document.getElementById("correctSound").volume=e.target.value;
document.getElementById("wrongSound").volume=e.target.value;
};

// Start Game
function startGame(){
document.getElementById("startScreen").style.display="none";
document.getElementById("quizBox").style.display="block";

let level=document.getElementById("level").value;
let shuffled=[...allQuestions[level]].sort(()=>Math.random()-0.5);
questions=shuffled.slice(0,10);

loadQuestion();
}

// Timer
function startTimer(){
time=10;
document.getElementById("timer").innerText="⏱️ "+time;

timer=setInterval(()=>{
time--;
document.getElementById("timer").innerText="⏱️ "+time;
if(time<=0){ clearInterval(timer); nextQuestion(); }
},1000);
}

// Load Question
function loadQuestion(){
if(index>=questions.length){ endQuiz(); return; }

clearInterval(timer);
startTimer();

document.getElementById("progress").innerText="Q "+(index+1)+"/10";

let q=questions[index];
document.getElementById("question").innerText=q.q;

let optEl=document.getElementById("options");
optEl.innerHTML="";

q.options.forEach((opt,i)=>{
let btn=document.createElement("button");
btn.innerText=opt;
btn.onclick=()=>checkAnswer(i);
optEl.appendChild(btn);
});
}

// Answer
function checkAnswer(i){
clearInterval(timer);

if(i===questions[index].answer){
score++;
document.getElementById("correctSound").play();
confetti();
}else{
document.getElementById("wrongSound").play();
}

nextQuestion();
}

// Next
function nextQuestion(){
index++;
setTimeout(loadQuestion,800);
}

// End
function endQuiz(){
document.getElementById("question").innerText="🎉 Finished!";
document.getElementById("options").innerHTML="";
document.getElementById("score").innerText="Score: "+score+"/10";
document.getElementById("restartBtn").style.display="block";
}

// Restart
function restartQuiz(){
location.reload();
}

// Confetti
function confetti(){
let c=document.getElementById("confetti");
let ctx=c.getContext("2d");
c.width=window.innerWidth;
c.height=window.innerHeight;

for(let i=0;i<120;i++){
ctx.fillStyle="hsl("+Math.random()*360+",100%,50%)";
ctx.fillRect(Math.random()*c.width,Math.random()*c.height,5,5);
}
setTimeout(()=>ctx.clearRect(0,0,c.width,c.height),500);
}

</script>

</body>
</html>
