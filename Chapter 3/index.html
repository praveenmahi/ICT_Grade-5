<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mail Merge Mission</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #43cea2, #185a9d);
    color: white;
    text-align: center;
}

.container {
    max-width: 700px;
    margin: auto;
    padding: 20px;
}

h1 {
    font-size: clamp(24px, 5vw, 42px);
}

#story {
    font-size: clamp(16px, 3.5vw, 22px);
    margin: 20px 0;
}

.btn {
    display: block;
    width: 100%;
    margin: 10px 0;
    padding: 12px;
    font-size: clamp(16px, 3vw, 20px);
    border: none;
    border-radius: 10px;
    background: white;
    color: black;
    cursor: pointer;
}

.btn:hover {
    background: yellow;
}

#info {
    font-size: 18px;
}

#restart {
    display: none;
    padding: 10px;
    background: red;
    color: white;
    border: none;
    border-radius: 10px;
}

.draggable {
    background: white;
    color: black;
    margin: 8px;
    padding: 10px;
    border-radius: 8px;
    cursor: grab;
}

.dropzone {
    border: 2px dashed white;
    padding: 15px;
    margin: 10px;
    min-height: 40px;
}

canvas {
    position: fixed;
    top:0;
    left:0;
    pointer-events:none;
}
</style>
</head>

<body>

<div class="container">
    <h1>🎮 Mail Merge Mission</h1>
    <div id="info">Level: 1 | Score: 0</div>
    <div id="story"></div>
    <div id="game"></div>
    <button id="restart" onclick="restartGame()">Restart Mission</button>
</div>

<canvas id="confetti"></canvas>

<script>
let level = 0;
let score = 0;

// Sound
function playSound(type){
    let ctx = new AudioContext();
    let osc = ctx.createOscillator();
    osc.frequency.value = type==="correct"?600:200;
    osc.connect(ctx.destination);
    osc.start();
    setTimeout(()=>osc.stop(),200);
}

// Levels
function loadLevel(){
    document.getElementById("info").innerText = "Level: "+(level+1)+" | Score: "+score;
    let game = document.getElementById("game");
    game.innerHTML="";

    // STORY
    if(level === 0){
        document.getElementById("story").innerText =
        "📜 You are a Data Manager. Your task is to send personalized letters using Mail Merge!";
        let btn=document.createElement("button");
        btn.className="btn";
        btn.innerText="Start Mission";
        btn.onclick=()=>{level++; loadLevel();}
        game.appendChild(btn);
    }

    // LEVEL 1
    else if(level === 1){
        document.getElementById("story").innerText =
        "🧠 Choose the correct meaning of Mail Merge";

        createOptions(["Game","Personalized document creation","Drawing tool"],1);
    }

    // LEVEL 2 (Drag sequence)
    else if(level === 2){
        document.getElementById("story").innerText =
        "🔢 Arrange the correct order of steps";

        let steps=["Data Source","Main Document","Merge"];
        steps.sort(()=>Math.random()-0.5);

        steps.forEach(step=>{
            let div=document.createElement("div");
            div.innerText=step;
            div.className="draggable";
            div.draggable=true;
            div.ondragstart=e=>e.dataTransfer.setData("text",step);
            game.appendChild(div);
        });

        let drop=document.createElement("div");
        drop.className="dropzone";
        drop.innerText="Drop here in order";
        let order=[];

        drop.ondragover=e=>e.preventDefault();
        drop.ondrop=e=>{
            let data=e.dataTransfer.getData("text");
            order.push(data);
            drop.innerHTML += "<br>"+data;

            if(order.length===3){
                if(order[0]==="Main Document" && order[1]==="Data Source"){
                    score++;
                    playSound("correct");
                    level++;
                    loadLevel();
                } else {
                    playSound("wrong");
                    alert("Wrong order! Try again.");
                    loadLevel();
                }
            }
        };
        game.appendChild(drop);
    }

    // LEVEL 3
    else if(level === 3){
        document.getElementById("story").innerText =
        "🧾 What stores addresses?";

        createOptions(["Main Document","Data Source","Printer"],1);
    }

    // WIN
    else{
        document.getElementById("story").innerText =
        "🏆 Mission Completed! You are a Mail Merge Master!";
        document.getElementById("restart").style.display="inline-block";
        startConfetti();
    }
}

// Options helper
function createOptions(options, correct){
    let game=document.getElementById("game");

    options.forEach((opt,i)=>{
        let btn=document.createElement("button");
        btn.className="btn";
        btn.innerText=opt;

        btn.onclick=()=>{
            if(i===correct){
                score++;
                level++;
                playSound("correct");
            } else {
                playSound("wrong");
            }
            loadLevel();
        };
        game.appendChild(btn);
    });
}

// Restart
function restartGame(){
    level=0;
    score=0;
    document.getElementById("restart").style.display="none";
    loadLevel();
}

// Confetti
const canvas=document.getElementById("confetti");
const ctx=canvas.getContext("2d");

function resize(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

let confetti=[];

function startConfetti(){
    for(let i=0;i<100;i++){
        confetti.push({
            x:Math.random()*canvas.width,
            y:Math.random()*canvas.height,
            r:Math.random()*6
        });
    }
    animate();
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    confetti.forEach(c=>{
        ctx.beginPath();
        ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
        ctx.fillStyle="yellow";
        ctx.fill();
        c.y+=2;
        if(c.y>canvas.height) c.y=0;
    });
    requestAnimationFrame(animate);
}

// Start
loadLevel();
</script>

</body>
</html>
