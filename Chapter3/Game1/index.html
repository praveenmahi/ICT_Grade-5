<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mail Merge Mission</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #43cea2, #185a9d);
    color: white;
    text-align: center;
}

.container {
    max-width: 700px;
    margin: auto;
    padding: 20px;
}

h1 {
    font-size: clamp(24px, 5vw, 42px);
}

#story {
    font-size: clamp(16px, 3.5vw, 22px);
    margin: 20px 0;
}

.btn {
    display: block;
    width: 100%;
    margin: 10px 0;
    padding: 14px;
    font-size: clamp(16px, 3vw, 20px);
    border: none;
    border-radius: 12px;
    background: white;
    color: black;
    cursor: pointer;
    transition: 0.2s;
}

.btn:hover {
    background: yellow;
}

#info {
    font-size: 18px;
    margin-top: 10px;
}

#restart {
    display: none;
    padding: 12px;
    margin-top: 20px;
    background: red;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 18px;
}

canvas {
    position: fixed;
    top:0;
    left:0;
    pointer-events:none;
}
</style>
</head>

<body>

<div class="container">
    <h1>🎮 Mail Merge Mission</h1>
    <div id="info">Level: 1 | Score: 0</div>
    <div id="story"></div>
    <div id="game"></div>
    <button id="restart" onclick="restartGame()">Restart Mission</button>
</div>

<canvas id="confetti"></canvas>

<script>
let level = 0;
let score = 0;

// SOUND FILES
const correctSound = new Audio("correct.mp3");
const wrongSound = new Audio("wrong.mp3");

correctSound.preload = "auto";
wrongSound.preload = "auto";

// Unlock audio (mobile fix)
document.body.addEventListener("click", () => {
    correctSound.play().then(()=>correctSound.pause()).catch(()=>{});
    wrongSound.play().then(()=>wrongSound.pause()).catch(()=>{});
}, { once: true });

function playSound(type){
    if(type === "correct"){
        correctSound.currentTime = 0;
        correctSound.play();
    } else {
        wrongSound.currentTime = 0;
        wrongSound.play();
    }
}

// LOAD LEVELS
function loadLevel(){
    document.getElementById("info").innerText = "Level: "+(level+1)+" | Score: "+score;
    let game = document.getElementById("game");
    game.innerHTML="";

    // ✅ MAIN SCREEN WITH START BUTTON
    if(level === 0){
        document.getElementById("story").innerText =
        "📜 You are a Data Manager. Complete tasks to master Mail Merge!";

        let startBtn = document.createElement("button");
        startBtn.className = "btn";
        startBtn.innerText = "🚀 Start Mission";

        startBtn.onclick = () => {
            level = 1;
            loadLevel();
        };

        game.appendChild(startBtn);
    }

    // LEVEL 1
    else if(level === 1){
        document.getElementById("story").innerText =
        "🧠 What is Mail Merge?";

        createOptions([
            "A drawing tool",
            "Creating personalized documents",
            "A game feature"
        ],1);
    }

    // LEVEL 2 (Tap Order)
    else if(level === 2){
        document.getElementById("story").innerText =
        "🔢 Tap the steps in the correct order";

        let correctOrder=["Main Document","Data Source","Merge"];
        let shuffled=[...correctOrder].sort(()=>Math.random()-0.5);

        let selected=[];

        shuffled.forEach(step=>{
            let btn=document.createElement("button");
            btn.innerText=step;
            btn.className="btn";

            btn.onclick=()=>{
                if(selected.includes(step)) return;

                selected.push(step);
                btn.style.background="lightgreen";

                if(selected.length===3){
                    if(JSON.stringify(selected) === JSON.stringify(correctOrder)){
                        score++;
                        playSound("correct");
                        level++;
                    } else {
                        playSound("wrong");
                        alert("Wrong order! Try again.");
                    }
                    loadLevel();
                }
            };

            game.appendChild(btn);
        });
    }

    // LEVEL 3
    else if(level === 3){
        document.getElementById("story").innerText =
        "🧾 Which stores names and addresses?";

        createOptions([
            "Main Document",
            "Printer",
            "Data Source"
        ],2);
    }

    // ✅ FINAL SCREEN WITH RESTART BUTTON
    else{
        document.getElementById("story").innerText =
        "🏆 Mission Completed! You are a Mail Merge Master!";
        
        document.getElementById("restart").style.display="inline-block";
        startConfetti();
    }
}

// OPTIONS
function createOptions(options, correctIndex){
    let game=document.getElementById("game");

    let correctAnswer = options[correctIndex];
    options = options.sort(()=>Math.random()-0.5);

    options.forEach(opt=>{
        let btn=document.createElement("button");
        btn.className="btn";
        btn.innerText=opt;

        btn.onclick=()=>{
            if(opt === correctAnswer){
                score++;
                level++;
                playSound("correct");
            } else {
                playSound("wrong");
            }
            loadLevel();
        };

        game.appendChild(btn);
    });
}

// RESTART
function restartGame(){
    level=0;
    score=0;
    document.getElementById("restart").style.display="none";
    confetti=[];
    loadLevel();
}

// CONFETTI
const canvas=document.getElementById("confetti");
const ctx=canvas.getContext("2d");

function resize(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

let confetti=[];

function startConfetti(){
    confetti=[];
    for(let i=0;i<120;i++){
        confetti.push({
            x:Math.random()*canvas.width,
            y:Math.random()*canvas.height,
            r:Math.random()*6
        });
    }
    animate();
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    confetti.forEach(c=>{
        ctx.beginPath();
        ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
        ctx.fillStyle="yellow";
        ctx.fill();
        c.y+=2;
        if(c.y>canvas.height) c.y=0;
    });
    requestAnimationFrame(animate);
}

// START
loadLevel();
</script>

</body>
</html>
